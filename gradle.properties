# Gradle runtime settings
org.gradle.jvmargs=-Xmx1G
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configuration-cache=true

# Parchment mapping versions used by NeoForge/ModDevGradle
parchment_minecraft_version=1.21.1
parchment_mappings_version=2024.11.17

# Minecraft and NeoForge target versions
minecraft_version=1.21.1
minecraft_version_range=[1.21.1]
neo_version=21.1.219
loader_version_range=[1,)

# Library dependency versions
geckolib_version=4.8.2
jei_version=19.27.0.336
jei_version_range=[19.27.0,)

# Mod metadata
mod_id=shroud
mod_name=Shroud
mod_license=MIT
mod_version=0.7.2
mod_group_id=net.oldmanyounger.shroud
mod_authors=OldManYounger
mod_description=Shrouded adds a new corrupted dimension, filled with custom biomes, world generation features, mobs and more! \
  It's loosely inspired by the Adrian Tchaikovsky novel 'Shroud', expressed through the closest thing Minecraft has \
  to that dark, alien world, which is sculk.